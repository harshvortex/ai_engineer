name: Auto Engineer Maintenance

on:
  schedule:
    # Run at 02:00 UTC daily (adjust as needed)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Auto Engineer
        run: python main.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit Memory Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add memory/history.json
          git commit -m "chore: update agent memory" || echo "No changes to commit"
          git push
