name: Auto Engineer Maintenance

on:
  schedule:
    # Run 4 times daily at staggered hours (UTC) for consistent activity
    - cron: '15 3 * * *'
    - cron: '45 9 * * *'
    - cron: '30 15 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto-engineer
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Auto Engineer
        run: python main.py --no-delay --multi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit Memory Updates
        working-directory: .
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add auto-engineer/memory/history.json
          git diff --cached --quiet || (git commit -m "chore: update agent memory" && git push)
